name: Publish VS Code extension

on:
  push:
    branches:
      - main

permissions:
  contents: read

# GitHub keeps the running publish and the newest pending main commit.
concurrency:
  group: vscode-marketplace-publish
  cancel-in-progress: false

env:
  EXTENSION_ID: paul-razvan-sarbu.dita-editor

jobs:
  publish:
    name: Test, package, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out the release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Type-check
        run: bun run typecheck

      - name: Build the production extension
        run: bun run build:production

      - name: Calculate the Marketplace version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          release_version="$(bun -e '
            const manifest = await Bun.file("package.json").json();
            const releaseLine = String(manifest.version);
            if (!/^(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.0$/.test(releaseLine)) {
              throw new Error(`package.json version must define a canonical major.minor.0 release line: ${manifest.version}`);
            }
            const parts = releaseLine.split(".").map(Number);
            const runNumber = Number(process.env.RUN_NUMBER);
            if (parts.some((part) => !Number.isSafeInteger(part))) {
              throw new Error(`package.json release line exceeds the supported integer range: ${manifest.version}`);
            }
            if (!Number.isSafeInteger(runNumber) || runNumber < 1) {
              throw new Error(`GITHUB_RUN_NUMBER must be a positive integer: ${process.env.RUN_NUMBER}`);
            }
            console.log(`${parts[0]}.${parts[1]}.${runNumber}`);
          ')"
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"
          echo "VSIX_PATH=artifacts/dita-editor-$release_version.vsix" >> "$GITHUB_ENV"

      - name: Check the Marketplace version boundary
        run: |
          metadata="$RUNNER_TEMP/marketplace-before.json"
          bun x vsce show "$EXTENSION_ID" --json > "$metadata"
          MARKETPLACE_METADATA="$metadata" bun -e '
            const data = await Bun.file(process.env.MARKETPLACE_METADATA).json();
            const parse = (value) => {
              if (!/^(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)$/.test(value)) {
                throw new Error(`Marketplace returned a non-stable version: ${value}`);
              }
              return value.split(".").map(Number);
            };
            const compare = (left, right) => {
              const a = parse(left);
              const b = parse(right);
              for (let index = 0; index < 3; index += 1) {
                if (a[index] !== b[index]) return a[index] - b[index];
              }
              return 0;
            };
            const versions = data.versions?.map((entry) => entry.version) ?? [];
            if (versions.length === 0) throw new Error("Marketplace returned no published versions");
            const latest = versions.sort((left, right) => compare(right, left))[0];
            if (compare(latest, process.env.RELEASE_VERSION) > 0) {
              throw new Error(`Release ${process.env.RELEASE_VERSION} is older than Marketplace ${latest}; advance the package.json release line`);
            }
          '

      - name: Package and inspect the VSIX
        run: |
          mkdir -p artifacts
          bun x vsce package "$RELEASE_VERSION" \
            --no-update-package-json \
            --no-dependencies \
            --out "$VSIX_PATH"
          bun run inspect:vsix "$VSIX_PATH"

      - name: Require the Marketplace credential
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::Add a VSCE_PAT repository secret before publishing."
            exit 1
          fi

      - name: Publish to the Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: bun x vsce publish --packagePath "$VSIX_PATH" --skip-duplicate

      - name: Verify the published VSIX
        run: |
          local_sha256="$(sha256sum "$VSIX_PATH" | cut -d " " -f 1)"
          metadata="$RUNNER_TEMP/marketplace-after.json"
          for attempt in 1 2 3 4 5 6; do
            if bun x vsce show "$EXTENSION_ID" --json > "$metadata" && \
              MARKETPLACE_METADATA="$metadata" LOCAL_VSIX_SHA256="$local_sha256" bun -e '
                const data = await Bun.file(process.env.MARKETPLACE_METADATA).json();
                const published = data.versions?.find((entry) => entry.version === process.env.RELEASE_VERSION);
                const publishedSha256 = published?.properties?.find(
                  (property) => property.key === "Microsoft.VisualStudio.Services.VsixSha256",
                )?.value;
                if (data.versions?.[0]?.version !== process.env.RELEASE_VERSION) process.exit(1);
                if (publishedSha256 !== process.env.LOCAL_VSIX_SHA256) process.exit(1);
              '; then
              echo "Verified $EXTENSION_ID@$RELEASE_VERSION with SHA-256 $local_sha256"
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then sleep 10; fi
          done
          echo "::error::Marketplace did not expose the expected version and VSIX SHA-256."
          exit 1
